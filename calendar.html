<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calendar - Vitality Fitness</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vant@4/lib/index.css" />
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/data-service.js"></script>

    <style>
        .calendar-select {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-cell {
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 10px;
            background: #fff;
            cursor: pointer;
            font-size: 16px;
            color: #444;
        }
        .day-cell:active { background: #f5f5f5; }

        .day-cell.active {
            background: var(--primary-pink, #FFB7B2);
            color: #fff;
            font-weight: 700;
        }

        .day-dot {
            position: absolute;
            bottom: 5px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--warm-yellow, #FDFD96);
        }
        .day-cell.active .day-dot {
            background: rgba(255,255,255,0.7);
        }

        /* Workout steps list (replaces van-steps) */
        .workout-steps { list-style: none; padding: 0; margin: 0; }
        .workout-step {
            display: flex;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .workout-step:last-child { border-bottom: none; }
        .step-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #FFB7B2;
            margin-top: 5px;
            flex-shrink: 0;
        }
        .step-dot.done { background: #5aab6f; }
        .step-body { flex: 1; }
        .step-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }
        .step-meta { font-size: 12px; color: #999; }
        .step-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 99px;
            background: #E8F5E9;
            color: #5aab6f;
            flex-shrink: 0;
            align-self: flex-start;
            margin-top: 2px;
        }
        .step-badge.planned { background: #fff3e0; color: #f3a11a; }

        /* Empty state */
        .cal-empty {
            text-align: center;
            padding: 32px 0;
            color: #ccc;
            font-size: 14px;
        }
        .cal-empty-icon { font-size: 36px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div id="app" class="page-container">
        <div class="user-bar">
            <div class="user-bar-name">👋 <span>{{ displayName }}</span></div>
            <button class="user-bar-logout" @click="signOut">退出</button>
        </div>
        <h1 class="header-title">Training History</h1>

        <!-- Month picker trigger -->
        <div class="card calendar-select" @click="showPicker = true">
            <strong>{{ currentLabel }}</strong>
            <van-icon name="arrow-down" />
        </div>

        <!-- Month picker popup -->
        <van-popup v-model:show="showPicker" position="bottom" round>
            <div style="padding: 16px;">
                <div style="text-align:center; font-size:12px; color:#999; margin-bottom: 10px;">
                    上下滑动选择年月（2025-2050）
                </div>
                <van-picker :columns="pickerColumns" @change="onPickerChange" />
            </div>
        </van-popup>

        <!-- Calendar grid -->
        <div class="card">
            <div style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 8px; color: #888; font-size: 12px;">
                <span v-for="d in ['日','一','二','三','四','五','六']" :key="d">{{ d }}</span>
            </div>

            <div class="calendar-days">
                <div v-for="blank in startOffset" :key="'b'+blank"></div>
                <div
                    v-for="day in daysInMonth"
                    :key="day"
                    class="day-cell"
                    :class="{ active: selectedDay === day }"
                    @click="selectedDay = day"
                >
                    {{ day }}
                    <span v-if="hasPlan(day)" class="day-dot"></span>
                </div>
            </div>
        </div>

        <!-- Selected day detail -->
        <div class="card">
            <h3 class="section-title">{{ selectedDate }}</h3>

            <!-- Has workouts -->
            <template v-if="selectedPlan.videos.length > 0">
                <div style="font-size: 22px; font-weight: 700; color: var(--primary-pink, #FFB7B2); margin-bottom: 14px;">
                    🔥 {{ selectedPlan.totalCalories }} kcal
                </div>
                <ul class="workout-steps">
                    <li v-for="video in selectedPlan.videos" :key="video.id" class="workout-step">
                        <div class="step-dot" :class="{ done: video.completed }"></div>
                        <div class="step-body">
                            <div class="step-title">{{ video.title }}</div>
                            <div class="step-meta">{{ video.duration }} min</div>
                        </div>
                        <span class="step-badge" :class="video.completed ? '' : 'planned'">
                            {{ video.completed ? '完成' : '计划' }}
                        </span>
                    </li>
                </ul>
            </template>

            <!-- Empty -->
            <div v-else class="cal-empty">
                <div class="cal-empty-icon">📭</div>
                <div>这天没有运动记录</div>
            </div>
        </div>

        <!-- Tab Bar -->
        <van-tabbar v-model="activeNav" active-color="#FFB7B2" inactive-color="#888">
            <van-tabbar-item icon="play-circle-o" url="index.html">Videos</van-tabbar-item>
            <van-tabbar-item icon="star-o" url="favorites.html">Saved</van-tabbar-item>
            <van-tabbar-item icon="todo-list-o" url="plan.html">Plan</van-tabbar-item>
            <van-tabbar-item icon="calendar-o" url="calendar.html">Calendar</van-tabbar-item>
            <van-tabbar-item icon="user-o" url="profile.html">Me</van-tabbar-item>
        </van-tabbar>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const activeNav = ref(3);
                const displayName = ref('');
                const allPlans = ref({});
                const now = new Date();
                const displayYear = ref(now.getFullYear());
                const displayMonth = ref(now.getMonth() + 1);
                const selectedDay = ref(now.getDate());
                const showPicker = ref(false);

                const yearOptions = Array.from({ length: 26 }, (_, i) => ({ text: `${2025 + i}`, value: `${2025 + i}` }));
                const monthOptions = Array.from({ length: 12 }, (_, i) => ({ text: `${i + 1} 月`, value: `${i + 1}`.padStart(2, '0') }));
                const pickerColumns = [yearOptions, monthOptions];

                const loadData = async () => {
                    allPlans.value = await window.AppApi.getAllPlans();
                };

                const currentLabel = computed(() => `${displayYear.value} 年 ${String(displayMonth.value).padStart(2, '0')} 月`);

                const startOffset = computed(() => new Date(displayYear.value, displayMonth.value - 1, 1).getDay());
                const daysInMonth = computed(() => new Date(displayYear.value, displayMonth.value, 0).getDate());

                const selectedDate = computed(() =>
                    `${displayYear.value}-${String(displayMonth.value).padStart(2, '0')}-${String(selectedDay.value).padStart(2, '0')}`
                );

                const selectedPlan = computed(() =>
                    allPlans.value[selectedDate.value] || { videos: [], totalCalories: 0 }
                );

                const hasPlan = (day) => {
                    const date = `${displayYear.value}-${String(displayMonth.value).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    return Boolean(allPlans.value[date] && allPlans.value[date].videos && allPlans.value[date].videos.length);
                };

                const onPickerChange = ({ selectedValues }) => {
                    displayYear.value = Number(selectedValues[0]);
                    displayMonth.value = Number(selectedValues[1]);
                    selectedDay.value = 1;
                };

                const signOut = () => window.AuthUtils.signOut();

                onMounted(async () => {
                    const user = await window.AuthUtils.requireAuth();
                    if (!user) return;
                    displayName.value = window.AuthUtils.getDisplayName(user);
                    await loadData();
                });

                return {
                    activeNav,
                    displayName,
                    showPicker,
                    pickerColumns,
                    currentLabel,
                    startOffset,
                    daysInMonth,
                    selectedDay,
                    selectedDate,
                    selectedPlan,
                    hasPlan,
                    onPickerChange,
                    signOut
                };
            }
        }).use(vant).mount('#app');
    </script>
</body>
</html>
